name: Run private pipeline

on:
  repository_dispatch:
    types: [run_private_pipeline]

permissions:
  contents: read

concurrency:
  group: private-pipeline
  cancel-in-progress: false

jobs:
  run-private-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Shanghai
      PYTHONIOENCODING: utf-8
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
      CLAUDE_PROVIDERS_JSON: ${{ secrets.CLAUDE_PROVIDERS_JSON }}
      IMAGE_PROVIDERS_JSON: ${{ secrets.IMAGE_PROVIDERS_JSON }}
    steps:
      - name: Checkout runner workspace
        uses: actions/checkout@v4

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run private pipeline
        run: python3 .github/scripts/run_private_pipeline.py
