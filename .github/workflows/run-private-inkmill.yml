name: Run private pipeline

on:
  repository_dispatch:
    types: [run_private_pipeline]

permissions:
  contents: read

concurrency:
  group: private-pipeline
  cancel-in-progress: false

jobs:
  run-private-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Shanghai
      PYTHONIOENCODING: utf-8
    steps:
      - name: Resolve private payload
        id: payload
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          event = json.loads(Path(os.environ['GITHUB_EVENT_PATH']).read_text(encoding='utf-8'))
          payload = event.get('client_payload') or {}
          private_repository = str(payload.get('private_repository') or '').strip()
          private_ref = str(payload.get('private_ref') or 'master').strip() or 'master'
          raw_autoaction = str(payload.get('autoaction') or '1').strip()
          topic = str(payload.get('topic') or '')
          article_type = str(payload.get('article_type') or '养生食物型')
          additional_requirements = str(payload.get('additional_requirements') or '')
          run_id = str(payload.get('run_id') or '')

          if not private_repository or '/' not in private_repository:
              raise SystemExit('private_repository payload is required')
          autoaction = int(raw_autoaction)
          if autoaction < 1:
              raise SystemExit('autoaction must be >= 1')

          print(f'::add-mask::{private_repository}')

          def write_output(name: str, value: str) -> None:
              with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
                  if '\n' in value:
                      fh.write(f'{name}<<EOF\n{value}\nEOF\n')
                  else:
                      fh.write(f'{name}={value}\n')

          write_output('private_repository', private_repository)
          write_output('private_ref', private_ref)
          write_output('autoaction', str(autoaction))
          write_output('topic', topic)
          write_output('article_type', article_type)
          write_output('additional_requirements', additional_requirements)
          write_output('run_id', run_id)
          print('[payload] resolved')
          PY

      - name: Checkout private workspace
        env:
          PRIVATE_REPOSITORY: ${{ steps.payload.outputs.private_repository }}
          PRIVATE_REF: ${{ steps.payload.outputs.private_ref }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "[checkout] PRIVATE_REPO_TOKEN is required"
            exit 1
          fi
          echo "::add-mask::$PRIVATE_REPO_TOKEN"
          REPO_URL="https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/${PRIVATE_REPOSITORY}.git"
          if git clone --quiet --branch "$PRIVATE_REF" "$REPO_URL" private-repo > "$RUNNER_TEMP/git-clone.log" 2>&1; then
            git -C private-repo remote set-url origin "$REPO_URL" > "$RUNNER_TEMP/git-remote.log" 2>&1
            echo "[checkout] completed"
          else
            echo "[checkout] failed; private output hidden"
            exit 1
          fi

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          python-version: '3.11'
          enable-cache: true
          cache-dependency-glob: |
            private-repo/pyproject.toml
            private-repo/uv.lock

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          if npm install -g @anthropic-ai/claude-code > "$RUNNER_TEMP/install-claude.log" 2>&1; then
            claude --version
          else
            echo "[claude] install failed; private output hidden"
            exit 1
          fi

      - name: Install Python dependencies
        working-directory: private-repo
        run: |
          if uv sync > "$RUNNER_TEMP/uv-sync.log" 2>&1; then
            echo "[deps] completed"
          else
            echo "[deps] failed; private output hidden"
            exit 1
          fi

      - name: Validate private config
        working-directory: private-repo
        env:
          CLAUDE_PROVIDERS_JSON: ${{ secrets.CLAUDE_PROVIDERS_JSON }}
          IMAGE_PROVIDERS_JSON: ${{ secrets.IMAGE_PROVIDERS_JSON }}
        run: |
          if uv run python scripts/validate_config.py > "$RUNNER_TEMP/validate-config.log" 2>&1; then
            echo "[validate] completed"
          else
            echo "[validate] failed; private output hidden"
            exit 1
          fi

      - name: Generate private articles
        working-directory: private-repo
        env:
          AUTOACTION: ${{ steps.payload.outputs.autoaction }}
          TOPIC: ${{ steps.payload.outputs.topic }}
          ARTICLE_TYPE: ${{ steps.payload.outputs.article_type }}
          ADDITIONAL_REQUIREMENTS: ${{ steps.payload.outputs.additional_requirements }}
          CLAUDE_PROVIDERS_JSON: ${{ secrets.CLAUDE_PROVIDERS_JSON }}
          IMAGE_PROVIDERS_JSON: ${{ secrets.IMAGE_PROVIDERS_JSON }}
        run: |
          for i in $(seq 1 "$AUTOACTION"); do
            prompt_file="claude_prompt_${i}.json"
            response_file="claude_response_${i}.json"
            requirements="${ADDITIONAL_REQUIREMENTS} 当前是今天自动批次第 ${i} 篇，请尽量与今天前面的自动文章错开角度。"

            if uv run python scripts/build_prompt.py \
              --topic "$TOPIC" \
              --article-type "$ARTICLE_TYPE" \
              --additional-requirements "$requirements" \
              > "$prompt_file" 2> "$RUNNER_TEMP/build-prompt-${i}.log"; then
              echo "[prompt] iteration ${i} completed"
            else
              echo "[prompt] iteration ${i} failed; private output hidden"
              exit 1
            fi

            if uv run python scripts/generate_article.py \
              --prompt-file "$prompt_file" \
              --output-file "$response_file" \
              > "$RUNNER_TEMP/generate-article-${i}.log" 2>&1; then
              echo "[generate] iteration ${i} completed"
            else
              echo "[generate] iteration ${i} failed; private output hidden"
              exit 1
            fi

            if uv run python scripts/persist_article.py \
              --response-file "$response_file" \
              --article-type "$ARTICLE_TYPE" \
              > "$RUNNER_TEMP/persist-article-${i}.log" 2>&1; then
              echo "[persist] iteration ${i} completed"
            else
              echo "[persist] iteration ${i} failed; private output hidden"
              exit 1
            fi
          done

      - name: Commit and push private results
        working-directory: private-repo
        env:
          PRIVATE_REF: ${{ steps.payload.outputs.private_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if uv run python scripts/commit_outputs.py --message "chore: auto generate articles [skip ci]" > "$RUNNER_TEMP/commit-outputs.log" 2>&1; then
            echo "[commit] article outputs checked"
          else
            echo "[commit] article output commit failed; private output hidden"
            exit 1
          fi

          if uv run python scripts/build_site_data.py > "$RUNNER_TEMP/build-site-data.log" 2>&1; then
            echo "[site] data built"
          else
            echo "[site] build failed; private output hidden"
            exit 1
          fi

          git add site/data/articles.json
          if ! git diff --cached --quiet; then
            if git commit -m "chore: refresh site data [skip ci]" > "$RUNNER_TEMP/site-commit.log" 2>&1; then
              echo "[commit] site data committed"
            else
              echo "[commit] site data commit failed; private output hidden"
              exit 1
            fi
          fi

          if git pull --rebase --autostash origin "$PRIVATE_REF" > "$RUNNER_TEMP/git-pull.log" 2>&1 && git push origin HEAD:"$PRIVATE_REF" > "$RUNNER_TEMP/git-push.log" 2>&1; then
            echo "[push] completed"
          else
            echo "[push] failed; private output hidden"
            exit 1
          fi
